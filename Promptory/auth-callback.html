<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signing in...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: white;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 20px;
      max-width: 400px;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #529CCA;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success { color: #4CAF50; font-size: 18px; font-weight: 600; }
    .error { color: #f44336; font-size: 18px; font-weight: 600; }
    .message { margin-top: 16px; font-size: 14px; color: #888; line-height: 1.5; }
    .arrow-hint {
      margin-top: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .arrow-hint svg {
      display: block;
      margin: 0 auto 8px;
      opacity: 0.6;
    }
    .arrow-hint p {
      font-size: 13px;
      color: #999;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">Signing in...</p>
    <p class="message" id="message"></p>
  </div>

  <!-- GSAP Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="auth-callback.js"></script>
  <script>
  (function() {
    if (typeof gsap === 'undefined') return;
    gsap.from('.container, .card, .auth-card', { scale: 0.9, opacity: 0, duration: 0.6, ease: 'back.out(1.7)' });
    gsap.from('h1, h2', { y: -20, opacity: 0, duration: 0.5, delay: 0.2, ease: 'power3.out' });
    gsap.from('p', { y: 10, opacity: 0, duration: 0.4, delay: 0.3, ease: 'power2.out' });
    
    // Spinner animation if present
    var spinner = document.querySelector('.spinner, .loading');
    if (spinner) {
      gsap.to(spinner, { rotation: 360, duration: 1, repeat: -1, ease: 'linear' });
    }
  })();
  </script>
</body>
</html>
