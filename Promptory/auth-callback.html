<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signing in...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: white;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 20px;
      max-width: 400px;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #529CCA;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success { color: #4CAF50; font-size: 18px; font-weight: 600; }
    .error { color: #f44336; font-size: 18px; font-weight: 600; }
    .message { margin-top: 16px; font-size: 14px; color: #888; line-height: 1.5; }
    .arrow-hint {
      margin-top: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .arrow-hint svg {
      display: block;
      margin: 0 auto 8px;
      opacity: 0.6;
    }
    .arrow-hint p {
      font-size: 13px;
      color: #999;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">Signing in...</p>
    <p class="message" id="message"></p>
  </div>

  <script>
    (function() {
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');
      const spinnerEl = document.getElementById('spinner');
      
      // Check for success redirect from background.js
      const hash = window.location.hash;
      const search = window.location.search;
      
      if (hash.includes('success=true')) {
        // Background script already saved the session - show success
        spinnerEl.style.display = 'none';
        statusEl.textContent = 'Signed in successfully!';
        statusEl.className = 'success';
        messageEl.innerHTML = 'You can close this tab and open Promptory from the extensions toolbar.';
        
        // Add helpful arrow hint
        const container = document.querySelector('.container');
        const hint = document.createElement('div');
        hint.className = 'arrow-hint';
        hint.innerHTML = `
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
          <p>Click the Promptory icon in your toolbar to continue</p>
        `;
        container.appendChild(hint);
        
        // Auto-close after 3 seconds
        setTimeout(() => { window.close(); }, 3000);
        return;
      }
      
      // Check for error from background.js redirect
      const errorParam = new URLSearchParams(search).get('error');
      if (errorParam) {
        spinnerEl.style.display = 'none';
        statusEl.textContent = 'Sign in failed';
        statusEl.className = 'error';
        messageEl.textContent = decodeURIComponent(errorParam);
        messageEl.innerHTML += '<br><br><small>You can close this tab and try again from the extension.</small>';
        return;
      }
      
      // Check for tokens in the hash (direct redirect from Supabase - fallback)
      const hashParams = new URLSearchParams(hash.replace('#', ''));
      const accessToken = hashParams.get('access_token');
      
      if (accessToken) {
        // We have tokens in hash - process them
        processTokens(hashParams);
        return;
      }
      
      // No tokens, no success, no error - show waiting message
      statusEl.textContent = 'Waiting for authentication...';
      messageEl.textContent = 'If you completed sign-in in another tab, this page will update automatically.';
      
      // Poll for session (in case background script saved it)
      let pollCount = 0;
      const pollInterval = setInterval(async () => {
        pollCount++;
        try {
          const result = await chrome.storage.local.get(['session', 'user']);
          if (result.session && result.user) {
            clearInterval(pollInterval);
            spinnerEl.style.display = 'none';
            statusEl.textContent = 'Signed in successfully!';
            statusEl.className = 'success';
            messageEl.innerHTML = `Welcome, ${result.user.name || result.user.email}! This tab will close automatically.`;
            setTimeout(() => { window.close(); }, 1500);
          }
        } catch (e) { /* ignore */ }
        
        if (pollCount >= 60) { // 30 seconds
          clearInterval(pollInterval);
          spinnerEl.style.display = 'none';
          statusEl.textContent = 'Authentication timed out';
          statusEl.className = 'error';
          messageEl.innerHTML = 'Please close this tab and try again from the extension.<br><br><small>Make sure your Google account is set up in Supabase dashboard.</small>';
        }
      }, 500);
      
      // Process tokens directly from URL hash (fallback for direct Supabase redirect)
      async function processTokens(params) {
        try {
          const token = params.get('access_token');
          const refreshToken = params.get('refresh_token');
          const expiresIn = parseInt(params.get('expires_in') || '3600');
          
          statusEl.textContent = 'Getting user info...';
          
          const SUPABASE_URL = 'https://vofgfvlgchqheksvlibl.supabase.co';
          const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvZmdmdmxnY2hxaGVrc3ZsaWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0OTgzNzEsImV4cCI6MjA4NjA3NDM3MX0.taoCHiYqJT2mSp5odtaM1p52KO5MnGzSOiz4dhmZnb0';
          
          const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
            headers: {
              'Authorization': `Bearer ${token}`,
              'apikey': SUPABASE_ANON_KEY
            }
          });
          
          if (!userRes.ok) throw new Error('Failed to get user info');
          
          const userData = await userRes.json();
          const user = {
            id: userData.id,
            email: userData.email,
            name: userData.user_metadata?.full_name || userData.user_metadata?.name || userData.email?.split('@')[0],
            avatar: userData.user_metadata?.avatar_url || userData.user_metadata?.picture || ''
          };
          
          const session = {
            access_token: token,
            refresh_token: refreshToken,
            expires_at: Date.now() + (expiresIn * 1000)
          };
          
          await chrome.storage.local.set({ session, user });
          
          spinnerEl.style.display = 'none';
          statusEl.textContent = 'Signed in successfully!';
          statusEl.className = 'success';
          messageEl.innerHTML = `Welcome, ${user.name || user.email}! This tab will close automatically.`;
          
          setTimeout(() => { window.close(); }, 1500);
        } catch (err) {
          spinnerEl.style.display = 'none';
          statusEl.textContent = 'Sign in failed';
          statusEl.className = 'error';
          messageEl.textContent = err.message;
          messageEl.innerHTML += '<br><br><small>You can close this tab and try again.</small>';
        }
      }
    })();
  </script>
</body>
</html>
