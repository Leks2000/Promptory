<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signing in...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: white;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #529CCA;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    .message { margin-top: 20px; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">Signing in...</p>
    <p class="message" id="message"></p>
  </div>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');
      const spinnerEl = document.getElementById('spinner');
      
      try {
        // Get tokens from URL hash
        const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));
        const queryParams = new URLSearchParams(window.location.search);
        
        // Check for error in query params (Supabase returns errors there)
        const error = queryParams.get('error') || hashParams.get('error');
        const errorDesc = queryParams.get('error_description') || hashParams.get('error_description');
        
        if (error) {
          throw new Error(errorDesc || error);
        }
        
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const expiresIn = parseInt(hashParams.get('expires_in') || '3600');

        if (!accessToken) {
          throw new Error('No access token received. Please try again.');
        }

        console.log('✅ Got access token, fetching user...');
        statusEl.textContent = 'Getting user info...';

        // Fetch user info
        const SUPABASE_URL = 'https://vofgfvlgchqheksvlibl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvZmdmdmxnY2hxaGVrc3ZsaWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0OTgzNzEsImV4cCI6MjA4NjA3NDM3MX0.taoCHiYqJT2mSp5odtaM1p52KO5MnGzSOiz4dhmZnb0';

        const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'apikey': SUPABASE_ANON_KEY
          }
        });

        if (!userRes.ok) {
          const errText = await userRes.text();
          throw new Error('Failed to get user info: ' + errText);
        }

        const userData = await userRes.json();
        console.log('✅ Got user:', userData.email);

        const user = {
          id: userData.id,
          email: userData.email,
          name: userData.user_metadata?.full_name || userData.user_metadata?.name || userData.email?.split('@')[0],
          avatar: userData.user_metadata?.avatar_url || userData.user_metadata?.picture || ''
        };

        const session = {
          access_token: accessToken,
          refresh_token: refreshToken,
          expires_at: Date.now() + (expiresIn * 1000)
        };

        // Save to storage
        await chrome.storage.local.set({ session, user });
        console.log('✅ Saved session');

        // Show success
        spinnerEl.style.display = 'none';
        statusEl.textContent = '✅ Signed in successfully!';
        statusEl.className = 'success';
        messageEl.textContent = `Welcome, ${user.name || user.email}! This tab will close automatically.`;

        // Close this window after a short delay
        setTimeout(() => {
          window.close();
        }, 1500);
        
      } catch (error) {
        console.error('❌ Auth callback error:', error);
        spinnerEl.style.display = 'none';
        statusEl.textContent = '❌ Sign in failed';
        statusEl.className = 'error';
        messageEl.textContent = error.message || 'Unknown error occurred';
        messageEl.innerHTML += '<br><br><small>You can close this tab and try again.</small>';
      }
    })();
  </script>
</body>
</html>
