<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promptory - Welcome</title>
  <link rel="stylesheet" href="../styles/variables.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(var(--accent-rgb), 0.08) 0%, transparent 60%);
    }

    .container {
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: var(--accent-gradient);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.3);
      animation: logoFloat 3s ease-in-out infinite;
    }
    .logo svg { color: white; }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Title */
    h1 {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-3);
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Subtitle */
    .subtitle {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: var(--line-height-relaxed);
    }

    /* Terms checkbox section */
    .terms-section {
      text-align: left;
      margin-bottom: 24px;
      padding: var(--space-4);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    .terms-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      font-size: var(--font-size-xs);
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .terms-label input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .terms-label a {
      color: var(--accent);
      text-decoration: none;
      font-weight: var(--font-weight-medium);
    }
    .terms-label a:hover {
      text-decoration: underline;
    }

    /* Google Sign-in Button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 6px;
      font-family: var(--font-family);
    }
    .btn-google:hover:not(:disabled) {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.4);
    }
    .btn-google:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-google svg { flex-shrink: 0; }

    .btn-google-hint {
      font-size: var(--font-size-xs);
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: var(--font-weight-medium);
    }

    /* Start without account button */
    .btn-skip {
      display: inline-block;
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: var(--font-size-sm);
      cursor: pointer;
      padding: 8px 16px;
      transition: color 0.2s ease;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-family: var(--font-family);
    }
    .btn-skip:hover:not(:disabled) {
      color: var(--text-secondary);
    }
    .btn-skip:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Status message */
    .status-message {
      margin-top: 16px;
      font-size: var(--font-size-xs);
      color: var(--error);
      display: none;
    }
    .status-message.visible {
      display: block;
    }

    /* Google icon */
    .google-icon {
      width: 18px;
      height: 18px;
    }

    /* Spinner for loading state */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-google.loading .spinner { display: inline-block; }
    .btn-google.loading .google-icon-wrap { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    </div>

    <h1 id="page-title">Welcome to Promptory!</h1>
    <p class="subtitle" id="page-subtitle">Your personal AI prompt manager. Save, organize, and instantly insert prompts into ChatGPT, Claude, Gemini, and more.</p>

    <!-- Terms checkbox -->
    <div class="terms-section">
      <label class="terms-label" id="terms-label">
        <input type="checkbox" id="age-terms-checkbox" />
        <span id="terms-text">I am at least 13 years old and I accept the <a href="#" id="terms-link">Terms of Service</a> &amp; <a href="#" id="privacy-link">Privacy Policy</a></span>
      </label>
    </div>

    <!-- Google Sign-in -->
    <button class="btn-google" id="google-signin-btn" disabled>
      <span class="google-icon-wrap">
        <svg class="google-icon" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </span>
      <span class="spinner"></span>
      <span id="google-btn-text">Sign in with Google</span>
    </button>
    <div class="btn-google-hint" id="google-hint-text">Get 100 prompts instead of 25</div>

    <!-- Start without account -->
    <button class="btn-skip" id="skip-btn" disabled>
      <span id="skip-btn-text">Start without account</span>
    </button>

    <!-- Status / error message -->
    <div class="status-message" id="status-message"></div>
  </div>

  <!--
    PHASE 1 — Core UI logic (no external dependencies)
    Checkbox listener attached FIRST so buttons always work
    even if analytics scripts fail to load.
  -->
  <script>
    (function() {
      'use strict';

      // === DOM elements ===
      const checkbox     = document.getElementById('age-terms-checkbox');
      const googleBtn    = document.getElementById('google-signin-btn');
      const skipBtn      = document.getElementById('skip-btn');
      const statusEl     = document.getElementById('status-message');

      // === Checkbox → enable/disable buttons ===
      checkbox.addEventListener('change', () => {
        googleBtn.disabled = !checkbox.checked;
        skipBtn.disabled   = !checkbox.checked;
        if (statusEl) { statusEl.classList.remove('visible'); statusEl.textContent = ''; }
        if (checkbox.checked && typeof trackEvent === 'function') {
          trackEvent('age_confirmed', { page: 'welcome' });
        }
      });

      // === Helper: show error ===
      function showStatus(msg) {
        if (statusEl) { statusEl.textContent = msg; statusEl.classList.add('visible'); }
      }

      // === Helper: open extension page in new tab ===
      function openExtPage(path) {
        try { chrome.tabs.create({ url: chrome.runtime.getURL(path) }); }
        catch (e) { console.warn('[Promptory] openExtPage error:', e); }
      }

      // === Terms / Privacy links ===
      function attachTermsLinks() {
        try {
          document.getElementById('terms-link')?.addEventListener('click', (e) => {
            e.preventDefault(); openExtPage('terms.html');
          });
          document.getElementById('privacy-link')?.addEventListener('click', (e) => {
            e.preventDefault(); openExtPage('privacy.html');
          });
        } catch (e) { console.warn('[Promptory] attachTermsLinks error:', e); }
      }
      attachTermsLinks();

      // === Store acceptance flags + mark hasLaunched ===
      function storeAcceptance() {
        try {
          chrome.storage.local.set({
            ageVerified: true,
            ageVerifiedDate: Date.now(),
            termsAccepted: true,
            privacyAccepted: true,
            hasLaunched: true
          });
        } catch (e) { console.warn('[Promptory] storage.set error:', e); }
      }

      // === Close this tab ===
      function closePage() {
        if (typeof trackEvent === 'function') {
          trackEvent('Page Close', {
            page_url: 'chrome-extension://onboarding/welcome',
            page_title: 'Promptory Welcome',
            page_name: 'Welcome',
            auto_closed: false
          });
        }
        // Close the current tab
        setTimeout(() => {
          try {
            chrome.tabs.getCurrent((tab) => {
              if (tab) chrome.tabs.remove(tab.id);
            });
          } catch (e) {
            window.close();
          }
        }, 300);
      }

      // === Google Sign-in ===
      googleBtn.addEventListener('click', async () => {
        if (!checkbox.checked) return;

        if (typeof trackEvent === 'function') {
          trackEvent('google_login_clicked', { page: 'welcome' });
        }

        // Show loading state
        googleBtn.disabled = true;
        googleBtn.classList.add('loading');
        document.getElementById('google-btn-text').textContent = 'Signing in...';

        // Store acceptance
        storeAcceptance();

        try {
          // Send message to background service worker for Google OAuth
          const result = await new Promise((resolve, reject) => {
            chrome.runtime.sendMessage({ action: 'signInWithGoogle' }, (response) => {
              if (chrome.runtime.lastError) {
                reject(new Error(chrome.runtime.lastError.message));
              } else {
                resolve(response);
              }
            });
          });

          if (result?.success) {
            if (typeof trackEvent === 'function') {
              trackEvent('google_login_success', { page: 'welcome' });
            }
            // Success! Close this page — user will use the extension popup from now on
            closePage();
          } else {
            // Login failed — reset button
            showStatus(result?.error || 'Sign-in failed. Please try again.');
            googleBtn.disabled = false;
            googleBtn.classList.remove('loading');
            const lang = document.getElementById('page-title').textContent.includes('Добро') ? 'ru' : 'en';
            document.getElementById('google-btn-text').textContent = lang === 'ru' ? 'Войти через Google' : 'Sign in with Google';
            if (typeof trackEvent === 'function') {
              trackEvent('google_login_failed', { page: 'welcome', error: result?.error });
            }
          }
        } catch (e) {
          console.warn('[Promptory] Google sign-in error:', e);
          showStatus('Sign-in error: ' + (e.message || 'Unknown error'));
          googleBtn.disabled = false;
          googleBtn.classList.remove('loading');
          document.getElementById('google-btn-text').textContent = 'Sign in with Google';
        }
      });

      // === Skip (start without account) ===
      skipBtn.addEventListener('click', () => {
        if (!checkbox.checked) return;

        storeAcceptance();

        if (typeof trackEvent === 'function') {
          trackEvent('extension_opened', { page: 'welcome', method: 'skip_account' });
        }

        // Close this page — user will use the extension popup from now on
        closePage();
      });

      // === Track manual page close ===
      window.addEventListener('beforeunload', () => {
        if (typeof trackEvent === 'function') {
          trackEvent('Page Close', {
            page_url: 'chrome-extension://onboarding/welcome',
            page_title: 'Promptory Welcome',
            page_name: 'Welcome',
            auto_closed: false
          });
        }
      });
    })();
  </script>

  <!--
    External dependencies loaded AFTER core UI is fully wired up.
    onerror handlers prevent silent failures.
  -->
  <script src="../mixpanel.min.js" onerror="console.warn('[Promptory] mixpanel.min.js failed to load')"></script>
  <script src="../config.js" onerror="console.warn('[Promptory] config.js failed to load')"></script>

  <!--
    PHASE 2 — Analytics & Localisation (may safely fail without affecting UI)
  -->
  <script>
    (function() {
      'use strict';

      // === Safe trackEvent — global for Phase 1 callers ===
      window.trackEvent = function(name, props) {
        try {
          if (typeof mixpanel !== 'undefined' && mixpanel.track) {
            mixpanel.track(name, props || {});
          }
        } catch (e) { /* silent */ }
      };

      // === Initialise Mixpanel ===
      try {
        const MIXPANEL_TOKEN = 'c86143cd74824a2d516134f860745000';
        if (typeof mixpanel !== 'undefined') {
          mixpanel.init(MIXPANEL_TOKEN, {
            debug: false,
            track_pageview: false,
            persistence: 'localStorage',
            api_host: 'https://api-js.mixpanel.com'
          });

          const appVersion = (typeof CONFIG !== 'undefined' && CONFIG.VERSION)
            ? CONFIG.VERSION : '1.10.0';

          mixpanel.track('Extension Installed', {
            app_version: appVersion,
            page_url: 'chrome-extension://onboarding/welcome',
            page_name: 'Welcome'
          });

          mixpanel.track('Page View', {
            page_url: 'chrome-extension://onboarding/welcome',
            page_title: 'Promptory Welcome',
            page_name: 'Welcome'
          });
        }
      } catch (e) {
        console.warn('[Promptory] Mixpanel init error:', e);
      }

      // === Localisation (Russian detection) ===
      function localise() {
        try {
          chrome.storage.local.get(['language'], (res) => {
            try {
              const lang = res?.language || (navigator.language.startsWith('ru') ? 'ru' : 'en');
              if (lang === 'ru') {
                document.getElementById('page-title').textContent = 'Добро пожаловать в Promptory!';
                document.getElementById('page-subtitle').textContent = 'Ваш персональный менеджер AI-промптов. Сохраняйте, организуйте и мгновенно вставляйте промпты в ChatGPT, Claude, Gemini и другие.';
                document.getElementById('terms-text').innerHTML = 'Мне есть 13 лет, и я принимаю <a href="#" id="terms-link">Условия использования</a> &amp; <a href="#" id="privacy-link">Политику конфиденциальности</a>';
                document.getElementById('google-btn-text').textContent = 'Войти через Google';
                document.getElementById('google-hint-text').textContent = 'Получи 100 промптов вместо 25';
                document.getElementById('skip-btn-text').textContent = 'Начать без аккаунта';
                // Re-attach links after innerHTML replacement
                reattachTermsLinks();
              }
            } catch (e) {
              console.warn('[Promptory] Localisation callback error:', e);
            }
          });
        } catch (e) {
          console.warn('[Promptory] chrome.storage.local.get error:', e);
        }
      }

      function reattachTermsLinks() {
        try {
          document.getElementById('terms-link')?.addEventListener('click', (e) => {
            e.preventDefault();
            chrome.tabs.create({ url: chrome.runtime.getURL('terms.html') });
          });
          document.getElementById('privacy-link')?.addEventListener('click', (e) => {
            e.preventDefault();
            chrome.tabs.create({ url: chrome.runtime.getURL('privacy.html') });
          });
        } catch (e) { /* silent */ }
      }

      localise();
    })();
  </script>
</body>
</html>
