<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promptory - Welcome</title>
  <link rel="stylesheet" href="../styles/variables.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(var(--accent-rgb), 0.08) 0%, transparent 60%);
    }

    .container {
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: var(--accent-gradient);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.3);
      animation: logoFloat 3s ease-in-out infinite;
    }
    .logo svg { color: white; }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Title */
    h1 {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-3);
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Subtitle */
    .subtitle {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: var(--line-height-relaxed);
    }

    /* Terms checkbox section */
    .terms-section {
      text-align: left;
      margin-bottom: 24px;
      padding: var(--space-4);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    /*
     * FIX: The checkbox toggle area and the <a> links are separated.
     * The checkbox + plain text are inside a <label> for proper toggle.
     * The links are rendered separately so their click handlers
     * do NOT interfere with the label's checkbox toggle behavior.
     *
     * Previous bug: <a> tags with preventDefault() inside <label>
     * prevented Chrome from toggling the checkbox on click.
     */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: var(--font-size-xs);
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .terms-row input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .terms-text-wrap {
      cursor: pointer;
      user-select: none;
    }

    .terms-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: var(--font-weight-medium);
      cursor: pointer;
    }
    .terms-link:hover {
      text-decoration: underline;
    }

    /* Google Sign-in Button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 6px;
      font-family: var(--font-family);
    }
    .btn-google:hover:not(:disabled) {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.4);
    }
    .btn-google:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-google svg { flex-shrink: 0; }

    .btn-google-hint {
      font-size: var(--font-size-xs);
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: var(--font-weight-medium);
    }

    /* Start without account button */
    .btn-skip {
      display: inline-block;
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: var(--font-size-sm);
      cursor: pointer;
      padding: 8px 16px;
      transition: color 0.2s ease;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-family: var(--font-family);
    }
    .btn-skip:hover:not(:disabled) {
      color: var(--text-secondary);
    }
    .btn-skip:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Status message */
    .status-message {
      margin-top: 16px;
      font-size: var(--font-size-xs);
      color: var(--error);
      display: none;
    }
    .status-message.visible {
      display: block;
    }

    /* Google icon */
    .google-icon {
      width: 18px;
      height: 18px;
    }

    /* Spinner for loading state */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-google.loading .spinner { display: inline-block; }
    .btn-google.loading .google-icon-wrap { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    </div>

    <h1 id="page-title">Welcome to Promptory!</h1>
    <p class="subtitle" id="page-subtitle">Your personal AI prompt manager. Save, organize, and instantly insert prompts into ChatGPT, Claude, Gemini, and more.</p>

    <!--
      Terms checkbox — FIXED layout:
      The checkbox and its plain-text label are toggled together.
      The <a> links are separate elements that do NOT prevent checkbox toggle.
    -->
    <div class="terms-section">
      <div class="terms-row">
        <input type="checkbox" id="age-terms-checkbox" />
        <span class="terms-text-wrap" id="terms-text-wrap">
          <span id="terms-text-before">I am at least 13 years old and I accept the</span>
          <a class="terms-link" id="terms-link" href="#">Terms of Service</a>
          <span>&amp;</span>
          <a class="terms-link" id="privacy-link" href="#">Privacy Policy</a>
        </span>
      </div>
    </div>

    <!-- Google Sign-in -->
    <button class="btn-google" id="google-signin-btn" disabled>
      <span class="google-icon-wrap">
        <svg class="google-icon" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </span>
      <span class="spinner"></span>
      <span id="google-btn-text">Sign in with Google</span>
    </button>
    <div class="btn-google-hint" id="google-hint-text">Get 100 prompts instead of 25</div>

    <!-- Start without account -->
    <button class="btn-skip" id="skip-btn" disabled>
      <span id="skip-btn-text">Start without account</span>
    </button>

    <!-- Status / error message -->
    <div class="status-message" id="status-message"></div>
  </div>

  <!--
    All scripts loaded as external files for CSP compliance.
    Manifest V3 CSP (script-src 'self') blocks inline <script> blocks.
    
    Load order:
    1. mixpanel.min.js — Mixpanel SDK
    2. config.js — shared app configuration
    3. welcome.js — all UI logic, analytics init, and localisation
  -->
  <!-- GSAP Core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../mixpanel.min.js"></script>
  <script src="../config.js"></script>
  <script src="welcome.js"></script>
  
  <!-- GSAP Onboarding Animations -->
  <script>
  (function() {
    if (typeof gsap === 'undefined') return;
    
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    
    // Container fade in
    tl.from('.container', { opacity: 0, scale: 0.9, duration: 0.6, ease: 'back.out(1.7)' })
    
    // Logo: 3D spin-in
    .from('.logo', {
      scale: 0,
      rotation: -360,
      opacity: 0,
      duration: 0.8,
      ease: 'back.out(2.5)'
    }, '-=0.3')
    
    // Logo continuous float (enhanced version)
    .to('.logo', {
      y: -8,
      duration: 2.5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut'
    })
    
    // Title: slide up with blur
    .from('h1', {
      y: 40,
      opacity: 0,
      filter: 'blur(10px)',
      duration: 0.6,
    }, '-=2.5')
    
    // Subtitle
    .from('.subtitle', {
      y: 20,
      opacity: 0,
      duration: 0.5,
    }, '-=2')
    
    // Terms section: slide in from left
    .from('.terms-section', {
      x: -40,
      opacity: 0,
      duration: 0.5,
      ease: 'back.out(1.5)'
    }, '-=1.5')
    
    // Google button: bounce in
    .from('.btn-google', {
      scale: 0.5,
      opacity: 0,
      duration: 0.5,
      ease: 'back.out(3)'
    }, '-=1')
    
    // Hint text
    .from('.btn-google-hint', {
      y: 10,
      opacity: 0,
      duration: 0.3,
    }, '-=0.6')
    
    // Skip button
    .from('.btn-skip', {
      y: 10,
      opacity: 0,
      duration: 0.3,
    }, '-=0.3');
    
    // Google button glow pulse
    gsap.to('.btn-google:not(:disabled)', {
      boxShadow: '0 0 25px rgba(108, 92, 231, 0.5)',
      duration: 1.5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 2
    });
    
    // Hover effects
    document.querySelector('.btn-google')?.addEventListener('mouseenter', function() {
      if (!this.disabled) {
        gsap.to(this, { scale: 1.03, duration: 0.25, ease: 'power2.out' });
      }
    });
    document.querySelector('.btn-google')?.addEventListener('mouseleave', function() {
      gsap.to(this, { scale: 1, duration: 0.3, ease: 'elastic.out(1, 0.5)' });
    });
    
    document.querySelector('.btn-skip')?.addEventListener('mouseenter', function() {
      if (!this.disabled) {
        gsap.to(this, { scale: 1.05, color: 'var(--accent)', duration: 0.2 });
      }
    });
    document.querySelector('.btn-skip')?.addEventListener('mouseleave', function() {
      gsap.to(this, { scale: 1, color: '', duration: 0.3, clearProps: 'color' });
    });
    
    // Checkbox interaction
    document.getElementById('age-terms-checkbox')?.addEventListener('change', function() {
      if (this.checked) {
        gsap.fromTo('.btn-google', { scale: 0.95 }, { scale: 1, duration: 0.4, ease: 'elastic.out(1.2, 0.5)' });
        gsap.fromTo('.btn-skip', { scale: 0.95 }, { scale: 1, duration: 0.4, ease: 'elastic.out(1.2, 0.5)' });
      }
    });
    
    // Background particles
    const particleCount = 20;
    for (let i = 0; i < particleCount; i++) {
      const dot = document.createElement('div');
      const size = gsap.utils.random(2, 5);
      dot.style.cssText = `
        position: fixed; width: ${size}px; height: ${size}px;
        background: rgba(var(--accent-rgb), ${gsap.utils.random(0.1, 0.3)});
        border-radius: 50%; pointer-events: none; z-index: 0;
        left: ${gsap.utils.random(0, 100)}%; top: ${gsap.utils.random(0, 100)}%;
      `;
      document.body.appendChild(dot);
      
      gsap.to(dot, {
        y: gsap.utils.random(-50, 50),
        x: gsap.utils.random(-30, 30),
        duration: gsap.utils.random(3, 8),
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: gsap.utils.random(0, 3)
      });
    }
    
    console.log('GSAP Welcome page animations loaded');
  })();
  </script>
</body>
</html>
