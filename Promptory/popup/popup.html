<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promptory</title>
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="onboarding-tutorial.css">
  <link rel="stylesheet" href="progress-modal.css">
  <link rel="stylesheet" href="search-filters.css">
</head>
<body>
  <!-- Welcome Screen (first launch — shown only if welcome.html wasn't completed yet) -->
  <div id="welcome-screen" class="welcome-screen" style="display: none;">
    <div class="welcome-content">
      <div class="welcome-logo" id="welcome-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </div>
      <h1 class="welcome-title" id="welcome-title">Welcome to Promptory</h1>
      <p class="welcome-text" id="welcome-text">
        Your personal AI prompt manager. Save, organize, and instantly insert prompts into ChatGPT, Claude, Gemini, and more.
      </p>
      <div class="welcome-features" id="welcome-features">
        <div class="welcome-feature">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span id="welcome-feat-1">Create &amp; organize prompts in folders</span>
        </div>
        <div class="welcome-feature">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <span id="welcome-feat-2">Instantly insert into any AI chat</span>
        </div>
        <div class="welcome-feature">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          <span id="welcome-feat-3">Share &amp; discover community prompts</span>
        </div>
      </div>
      <button class="btn btn-primary btn-lg ripple" id="get-started-btn">
        Get Started
      </button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="main-app" style="display: none;">
    <!-- Header -->
    <header class="header" role="banner">
      <div class="header-left">
        <h1 class="app-title">Promptory</h1>
      </div>
      <div class="header-right">
        <button class="btn btn-ghost btn-sm ripple" id="new-prompt-btn" title="Create new prompt" aria-label="Create new prompt">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New
        </button>
        <button class="btn btn-icon btn-ghost settings-btn" id="settings-btn" title="Settings" aria-label="Open settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span class="sr-only">Settings</span>
        </button>
      </div>
    </header>

    <!-- Search Bar -->
    <div class="search-bar" role="search" aria-label="Search prompts">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search prompts..." aria-label="Search prompts by title, tags, or content">
      </div>
    </div>

    <!-- Tabs -->
    <nav class="tabs" role="tablist" aria-label="Main navigation">
      <button class="tab-btn active" data-tab="prompts" role="tab" aria-selected="true" aria-controls="prompts-tab">Prompts</button>
      <button class="tab-btn" data-tab="folders" role="tab" aria-selected="false" aria-controls="folders-tab">Folders</button>
      <button class="tab-btn" data-tab="favorites" role="tab" aria-selected="false" aria-controls="favorites-tab">Favorites</button>
      <button class="tab-btn" data-tab="explore" role="tab" aria-selected="false" aria-controls="explore-tab">Explore</button>
      <button class="tab-btn" data-tab="stats" role="tab" aria-selected="false" aria-controls="stats-tab">Stats</button>
    </nav>

    <!-- Tab Contents -->
    <main class="content" role="main">
      <div id="prompts-tab" class="tab-content active" role="tabpanel" aria-labelledby="prompts">
        <div id="prompts-list" role="list" aria-label="Your prompts"></div>
      </div>
      <div id="folders-tab" class="tab-content" role="tabpanel" aria-labelledby="folders">
        <div class="tab-header">
          <button class="btn btn-secondary btn-sm ripple" id="new-folder-btn" aria-label="Create new folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New Folder
          </button>
        </div>
        <div id="folders-list" role="list" aria-label="Your folders"></div>
      </div>
      <div id="favorites-tab" class="tab-content" role="tabpanel" aria-labelledby="favorites">
        <div id="favorites-list" role="list" aria-label="Favorite prompts"></div>
      </div>
      <div id="explore-tab" class="tab-content" role="tabpanel" aria-labelledby="explore">
        <div id="explore-list" aria-label="Public prompt library"></div>
      </div>
      <div id="stats-tab" class="tab-content" role="tabpanel" aria-labelledby="stats">
        <div id="stats-content" aria-label="Usage statistics"></div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="alert" aria-live="polite" aria-atomic="true"></div>

  <!-- GSAP Core + Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- Promptory GSAP Animations -->
  <script src="gsap-animations.js"></script>
  
  <script src="../mixpanel.min.js"></script>
  <script src="../config.js"></script>
  <script src="modules/utils.js"></script>
  <script src="modules/analytics.js"></script>
  <script src="modules/state.js"></script>
  <script src="modules/offline.js"></script>
  <script src="modules/prompts.js"></script>
  <script src="modules/explore.js"></script>
  <script src="modules/editor.js"></script>
  <script src="modules/settings.js"></script>
  <script src="onboarding-tutorial.js"></script>
  <script src="progress-modal.js"></script>
  <script src="search-filters.js"></script>
  <script src="popup.js"></script>
</body>
</html>
