<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptVault</title>
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Welcome Screen (first launch) -->
  <div id="welcome-screen" class="welcome-screen" style="display: none;">
    <div class="welcome-content">
      <h1 class="welcome-title" id="welcome-title">Welcome to PromptVault</h1>
      <p class="welcome-text" id="welcome-text">
        Your personal AI prompt manager. Save, organize, and instantly insert prompts into ChatGPT, Claude, Gemini, and more.
      </p>
      <button class="btn btn-primary btn-lg ripple" id="get-started-btn">
        Get Started
      </button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="main-app" style="display: none;">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="app-title">PromptVault</h1>
      </div>
      <div class="header-right">
        <button class="btn btn-ghost btn-sm ripple" id="new-prompt-btn" title="Create new prompt">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New
        </button>
        <button class="btn btn-icon btn-ghost settings-btn" id="settings-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search Bar -->
    <div class="search-bar">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search prompts...">
      </div>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="prompts">Prompts</button>
      <button class="tab-btn" data-tab="folders">Folders</button>
      <button class="tab-btn" data-tab="favorites">Favorites</button>
      <button class="tab-btn" data-tab="explore">Explore</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
    </nav>

    <!-- Tab Contents -->
    <main class="content">
      <div id="prompts-tab" class="tab-content active">
        <div id="prompts-list"></div>
      </div>
      <div id="folders-tab" class="tab-content">
        <div class="tab-header">
          <button class="btn btn-secondary btn-sm ripple" id="new-folder-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New Folder
          </button>
        </div>
        <div id="folders-list"></div>
      </div>
      <div id="favorites-tab" class="tab-content">
        <div id="favorites-list"></div>
      </div>
      <div id="explore-tab" class="tab-content">
        <div id="explore-list"></div>
      </div>
      <div id="stats-tab" class="tab-content">
        <div id="stats-content"></div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
