<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptVault</title>
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Welcome Screen (first launch) -->
  <div id="welcome-screen" class="welcome-screen" style="display: none;">
    <div class="welcome-content">
      <div class="welcome-icon">📝</div>
      <h1 class="welcome-title">Welcome to PromptVault</h1>
      <p class="welcome-text">
        Your personal AI prompt manager. Save, organize, and instantly insert prompts into ChatGPT, Claude, Gemini, and more.
      </p>
      <button class="btn btn-primary btn-lg ripple" id="get-started-btn">
        Get Started
      </button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="main-app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="app-title">PromptVault</h1>
      </div>
      <div class="header-right">
        <button class="btn btn-ghost btn-sm ripple" id="new-prompt-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          New
        </button>
        <button class="btn btn-icon btn-ghost settings-btn" id="settings-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6M6.3 3.7l4.2 4.2m4.2 4.2l4.2 4.2M1 12h6m6 0h6M3.7 6.3l4.2 4.2m4.2 4.2l4.2 4.2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search Bar -->
    <div class="search-bar">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search prompts...">
      </div>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="prompts">Prompts</button>
      <button class="tab-btn" data-tab="folders">Folders</button>
      <button class="tab-btn" data-tab="favorites">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </button>
      <button class="tab-btn" data-tab="explore">Explore</button>
    </nav>

    <!-- Tab Contents -->
    <main class="content">
      <!-- Prompts Tab -->
      <div id="prompts-tab" class="tab-content active">
        <div id="prompts-list"></div>
      </div>

      <!-- Folders Tab -->
      <div id="folders-tab" class="tab-content">
        <div class="tab-header">
          <button class="btn btn-secondary btn-sm ripple" id="new-folder-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New Folder
          </button>
        </div>
        <div id="folders-list"></div>
      </div>

      <!-- Favorites Tab -->
      <div id="favorites-tab" class="tab-content">
        <div id="favorites-list"></div>
      </div>

      <!-- Explore Tab -->
      <div id="explore-tab" class="tab-content">
        <div id="explore-list"></div>
      </div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="../lib/supabase.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
