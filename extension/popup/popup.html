<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptVault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app" class="app">
    <!-- ===== HEADER ===== -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg class="logo-svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#7c3aed"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="url(#logoGrad)" stroke-width="2" fill="url(#logoGrad)" fill-opacity="0.15" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="logo-text">PromptVault</span>
        </div>
      </div>
      <div class="header-right">
        <button id="btn-stats" class="icon-btn" title="Statistics">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="18" y="3" width="4" height="18" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="2" y="13" width="4" height="8" rx="1"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- ===== SEARCH BAR ===== -->
    <div class="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search prompts..." autocomplete="off">
      <div class="search-actions">
        <select id="sort-select" class="sort-select" title="Sort by">
          <option value="date">Newest</option>
          <option value="alpha">A-Z</option>
          <option value="usage">Most Used</option>
          <option value="recent">Recent</option>
        </select>
      </div>
    </div>

    <!-- ===== TABS ===== -->
    <div class="tabs">
      <button class="tab active" data-tab="prompts">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Prompts
      </button>
      <button class="tab" data-tab="folders">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Folders
      </button>
      <button class="tab" data-tab="favorites">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Favorites
      </button>
      <button class="tab" data-tab="library">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Explore
      </button>
    </div>

    <!-- ===== CONTENT AREA ===== -->
    <div class="content" id="content">

      <!-- Prompts Tab -->
      <div class="tab-content active" id="tab-prompts">
        <div id="prompts-list" class="prompts-list"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </div>
          <p class="empty-title">No prompts yet</p>
          <p class="empty-sub">Click <b>+</b> to create your first prompt</p>
        </div>
      </div>

      <!-- Folders Tab -->
      <div class="tab-content" id="tab-folders">
        <div id="folders-list" class="folders-list"></div>
        <div id="folders-empty" class="empty-state hidden">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </div>
          <p class="empty-title">No folders yet</p>
          <p class="empty-sub">Organize your prompts into folders</p>
        </div>
      </div>

      <!-- Favorites Tab -->
      <div class="tab-content" id="tab-favorites">
        <div id="favorites-list" class="prompts-list"></div>
        <div id="favorites-empty" class="empty-state hidden">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </div>
          <p class="empty-title">No favorites yet</p>
          <p class="empty-sub">Star your best prompts for quick access</p>
        </div>
      </div>

      <!-- Library Tab (Public) -->
      <div class="tab-content" id="tab-library">
        <div id="library-grid" class="library-grid"></div>
      </div>
    </div>

    <!-- ===== STATS PANEL ===== -->
    <div id="stats-panel" class="panel hidden">
      <div class="panel-header">
        <h3>Statistics</h3>
        <button class="panel-close" data-close="stats-panel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="panel-body" id="stats-body"></div>
    </div>

    <!-- ===== FAB ===== -->
    <button id="fab-create" class="fab" title="New Prompt">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- ===== CREATE/EDIT MODAL ===== -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">New Prompt</h3>
          <button id="modal-close" class="modal-close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="prompt-name">Title</label>
            <input type="text" id="prompt-name" placeholder="e.g. Summarize Article" autocomplete="off">
          </div>
          <div class="form-group">
            <label for="prompt-text">
              Prompt Text
              <span class="label-hint">Use {variable} for dynamic parts</span>
            </label>
            <textarea id="prompt-text" rows="5" placeholder="Enter your prompt here...&#10;&#10;Use {topic} or {tone} for variables"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group form-half">
              <label for="prompt-folder">Folder</label>
              <select id="prompt-folder">
                <option value="">No Folder</option>
              </select>
            </div>
            <div class="form-group form-half">
              <label for="prompt-tags">Tags <span class="label-hint">comma separated</span></label>
              <input type="text" id="prompt-tags" placeholder="e.g. writing, email" autocomplete="off">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button id="modal-save" class="btn btn-primary">Save Prompt</button>
        </div>
      </div>
    </div>

    <!-- ===== FOLDER MODAL ===== -->
    <div id="folder-modal-overlay" class="modal-overlay hidden">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 id="folder-modal-title">New Folder</h3>
          <button id="folder-modal-close" class="modal-close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="folder-name">Folder Name</label>
            <input type="text" id="folder-name" placeholder="e.g. Work Prompts" autocomplete="off">
          </div>
          <div class="form-group">
            <label>Icon</label>
            <div class="icon-picker" id="folder-icon-picker">
              <button class="icon-option active" data-icon="📁">📁</button>
              <button class="icon-option" data-icon="💼">💼</button>
              <button class="icon-option" data-icon="🎨">🎨</button>
              <button class="icon-option" data-icon="💻">💻</button>
              <button class="icon-option" data-icon="📧">📧</button>
              <button class="icon-option" data-icon="🎯">🎯</button>
              <button class="icon-option" data-icon="🧠">🧠</button>
              <button class="icon-option" data-icon="✍️">✍️</button>
              <button class="icon-option" data-icon="📊">📊</button>
              <button class="icon-option" data-icon="🚀">🚀</button>
              <button class="icon-option" data-icon="🎬">🎬</button>
              <button class="icon-option" data-icon="📸">📸</button>
            </div>
          </div>
          <div class="form-group">
            <label>Color</label>
            <div class="color-picker" id="folder-color-picker">
              <button class="color-option active" data-color="#7c3aed" style="background:#7c3aed"></button>
              <button class="color-option" data-color="#6366f1" style="background:#6366f1"></button>
              <button class="color-option" data-color="#ec4899" style="background:#ec4899"></button>
              <button class="color-option" data-color="#ef4444" style="background:#ef4444"></button>
              <button class="color-option" data-color="#f97316" style="background:#f97316"></button>
              <button class="color-option" data-color="#22c55e" style="background:#22c55e"></button>
              <button class="color-option" data-color="#06b6d4" style="background:#06b6d4"></button>
              <button class="color-option" data-color="#3b82f6" style="background:#3b82f6"></button>
            </div>
          </div>
          <div class="form-group">
            <label for="folder-parent">Parent Folder</label>
            <select id="folder-parent">
              <option value="">Root</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button id="folder-modal-cancel" class="btn btn-ghost">Cancel</button>
          <button id="folder-modal-save" class="btn btn-primary">Create Folder</button>
        </div>
      </div>
    </div>

    <!-- ===== VARIABLE INPUT MODAL ===== -->
    <div id="variable-modal-overlay" class="modal-overlay hidden">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3>Fill Variables</h3>
          <button id="variable-modal-close" class="modal-close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body" id="variable-fields"></div>
        <div class="modal-footer">
          <button id="variable-modal-cancel" class="btn btn-ghost">Cancel</button>
          <button id="variable-modal-insert" class="btn btn-primary">Insert Prompt</button>
        </div>
      </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast hidden">
      <span id="toast-icon"></span>
      <span id="toast-msg"></span>
    </div>
  </div>

  <script src="../lib/chrome-mock.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
